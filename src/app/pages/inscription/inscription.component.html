<div class="page-center">
  <div class="form-card">
    <h2>Inscription</h2>

    <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate>
      <input [(ngModel)]="nom" name="nom" placeholder="Nom" required />
      <input [(ngModel)]="prenom" name="prenom" placeholder="Prénom" required />
      <input [(ngModel)]="email" name="email" type="email" placeholder="Email" required />
      <input [(ngModel)]="motDePasse" name="motDePasse" type="password" placeholder="Mot de passe" required />
      <input [(ngModel)]="confirmMotDePasse" name="confirmMotDePasse" type="password" placeholder="Confirmer le mot de passe" required />

      <select [(ngModel)]="pays" name="pays" required>
        <option [ngValue]="null" disabled>Choisissez un pays</option>
        <option *ngFor="let p of paysList" [value]="p.name">{{ p.name }}</option>
      </select>

      <input [(ngModel)]="dateNaissance" name="dateNaissance" type="date" required />

      <button type="submit">S'inscrire</button>
    </form>
  </div>
</div>
